version: "3"

server:
  command: "php"
  user: ""
  group: ""
  env:
    - APP_RUNTIME: RoadRunner
    - LARAVEL_OCTANE: 1

http:
  address: 0.0.0.0:8000
  middleware: ["gzip"]
  pool:
    num_workers: 4
    max_jobs: 0
    allocate_timeout: 60s
    destroy_timeout: 60s
  static:
    dir: "public"
    forbid: [".htaccess", ".php"]
  headers:
    cors:
      allowed_origin: "*"
      allowed_headers: "*"
      allowed_methods: "GET,POST,PUT,DELETE,OPTIONS"
      exposed_headers: "Content-Length"
      max_age: 600

logs:
  level: error
  output: stdout
  err_output: stderr
  encoding: json

metrics:
  address: localhost:2112

