<svg xmlns="http://www.w3.org/2000/svg"  viewBox="0 50 285 80" height="80">
  <!-- Надпись с эффектом свечения для тёмной темы -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feMerge>
        <feMergeNode in="offsetblur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <text x="0" y="110" font-family="'Pacifico', 'Segoe UI Script', 'Brush Script MT', cursive" font-size="96" fill="none" stroke="#f5d7a7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    Surprise
  </text>
  <text x="0" y="110" font-family="'Pacifico', 'Segoe UI Script', 'Brush Script MT', cursive" font-size="96" fill="#fff0d0">
    Surprise
  </text>
</svg>